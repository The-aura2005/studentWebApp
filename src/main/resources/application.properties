server.error.include-message=always
server.error.include-binding-errors=always

# 1. Database Connection String (Points to local machine by default, but allows overrides)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3308/student_web_app?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

# 2. Hibernate/JPA Configuration (Strictly MySQL)
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.web.resources.cache.period=0